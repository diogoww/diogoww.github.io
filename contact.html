  <body class="page">

    <div class="lm-animated-bg"></div>

      <div class="preloader-animation">
        <div class="preloader-spinner">
        </div>
      </div>
    </div>
    

    
    <div class="lmpixels-scroll-to-top"><i class="lnr lnr-chevron-up"></i></div>
    

    <div class="page-scroll">
      <div id="page_container" class="page-container bg-move-effect" data-animation="transition-flip-in-right">

        
        <header id="site_header" class="header">
          <div class="header-content clearfix">
                
            
            <div class="text-logo">
              <a href="index.html">
                <div class="logo-symbol">D</div>
                <div class="logo-text">Diogo <span>Varaschin</span></div>
              </a>
            </div>
            

            
            <div class="site-nav mobile-menu-hide">
              <ul class="leven-classic-menu site-main-menu">
                <li class="menu-item">
                  <a href="index.html">Página Inicial</a>
                </li>

                <li class="menu-item">
                  <a href="resume.html">Experiencias</a>

                <li class="menu-item current-menu-item">
                  <a href="contact.html">Contato</a>

              </ul>
            </div>

            <a class="menu-toggle mobile-visible">
                <i class="fa fa-bars"></i>
            </a>
          </div>
        </header>
        

        <div id="main" class="site-main">
          <div id="main-content" class="single-page-content">
            <div id="primary" class="content-area">

              <div class="page-title">
                <h1>Fale Comigo!</h1>
                <div class="page-subtitle">
                    <h4> Entre em contato.</h4>
                </div>
              </div>

              <div id="content" class="page-content site-content single-post" role="main">

                <div class="row">
                  <div class=" col-xs-12 col-sm-4 ">
                        
                    <div id="info_list_1" class="info-list-w-icon">

                      <div class="info-block-w-icon">
                        <div class="ci-icon">
                          <i class="linecons linecons-location"></i>
                        </div>
                        <div class="ci-text">
                          <h4>Curitiba, Paraná</h4>
                        </div>
                      </div>
                      
                      <div class="info-block-w-icon">
                        <div class="ci-icon">
                          <i class="linecons linecons-mail"></i>
                        </div>
                        <div class="ci-text">
                          <h4><a href="mailto:diogovaraschin@outlook.com">diogovaraschin@outlook.com</a></h4>
                        </div>
                      </div>
                    </div>

                  </div>


                  <div class=" col-xs-12 col-sm-8 ">

                    <div class="block-title">
                      <h2>Como posso te ajudar?</h2>
                    </div>

                    <form id="contact_form" class="contact-form" action="">

                      <div class="messages"></div>

                      <div class="controls two-columns">
                        <div class="fields clearfix">
                          <div class="left-column">
                            <div class="form-group form-group-with-icon">
                              <input id="form_name" type="text" name="name" class="form-control" placeholder="Nome Completo" required="required" data-error="Name is required.">
                              <div class="form-control-border"></div>
                              <div class="help-block with-errors"></div>
                            </div>

                            <div class="form-group form-group-with-icon">
                              <input id="form_email" type="email" name="email" class="form-control" placeholder="Endereço de Email" required="required" data-error="Valid email is required.">
                              <div class="form-control-border"></div>
                              <div class="help-block with-errors"></div>
                            </div>

                            <div class="form-group form-group-with-icon">
                              <input id="form_subject" type="text" name="subject" class="form-control" placeholder="Assunto" required="required" data-error="Subject is required.">
                              <div class="form-control-border"></div>
                              <div class="help-block with-errors"></div>
                            </div>
                          </div>
                          <div class="right-column">
                            <div class="form-group form-group-with-icon">
                              <textarea id="form_message" name="message" class="form-control" placeholder="Mensagem" rows="7" required="required" data-error="Please, leave me a message."></textarea>
                              <div class="form-control-border"></div>
                              <div class="help-block with-errors"></div>
                            </div>
                          </div>
                        </div>

      
                        <input type="submit" class="button btn-send disabled" value="Enviar Mensagem">
                      </div>
                    </form>

                  </div>


                </div>

              </div>
            </div>
          </div>
        </div>

        <footer class="site-footer clearfix">
          <div class="footer-social">

              </li>
            </ul>
          </div>
              
          <div class="footer-copyrights">
